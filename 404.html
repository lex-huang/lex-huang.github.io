<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23000'/%3E%3Cpath d='M6 8 L14 16 L6 24' stroke='%230f0' stroke-width='3' fill='none'/%3E%3Crect x='16' y='20' width='8' height='4' fill='%230f0'/%3E%3C/svg%3E">
    <title>404 - Command Not Found</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="404">
    <canvas id="bg-canvas"></canvas>
    
    <div id="terminal-container" class="terminal-window">
        <div class="terminal-header">
            <div class="terminal-controls">
                <div class="control close"></div>
                <div class="control minimize"></div>
                <div class="control maximize"></div>
            </div>
        </div>
        <div class="content-area">
            <div class="command-line">
                <span class="prompt">root@dev:~$</span>
                <h1>./show_profile.sh "LEX"</h1>
            </div>
            
            <div id="error-output">
                <p class="text-danger mb-1">bash: No such file or directory</p>
                
                <div class="output-container">
                    <span class="prompt" style="color: #666;">></span>
                    <span id="typewriter-404"></span><span class="cursor"></span>
                </div>
            </div>
        </div>
         <footer class="terminal-footer">
            <span>System Error: 404 Not Found</span>
        </footer>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
